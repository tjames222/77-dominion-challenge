<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1116" />
    <title>Profile | Dominion</title>
    <link rel="stylesheet" href="./src/assets/styles.css" />
    <link rel="stylesheet" href="./src/assets/product.css" />
    <link rel="stylesheet" href="./src/assets/menu.css" />
  </head>
  <body>
    <main class="app-shell dashboard-shell">
      <header class="topbar">
        <a class="back-link" href="./dashboard.html">Dashboard</a>
      </header>

      <section class="dashboard-hero compact-hero reveal is-visible">
        <p class="eyebrow">Profile</p>
        <h1>Your Dominion</h1>
        <p class="lead">Manage your challenge identity, group, and account details.</p>
      </section>

      <section class="card reveal">
        <p class="eyebrow">Account</p>
        <h2 id="profileName">Member</h2>
        <p class="section-copy" id="profileEmail">Logged in</p>
      </section>

      <section class="card reveal">
        <p class="eyebrow">Challenge</p>
        <h2>77-Day Dominion Challenge</h2>
        <p class="section-copy">Group: San Marcos Men</p>
        <p class="section-copy">Status: Active</p>
      </section>

      <section class="card reveal profile-appearance">
        <p class="eyebrow">Appearance</p>
        <h2>Theme</h2>
        <p class="section-copy">Choose the look that feels best for your daily check-ins.</p>
        <div class="appearance-toggle" role="group" aria-label="Theme selection">
          <button class="appearance-option" type="button" data-theme-mode="dark" aria-pressed="false">Dark</button>
          <button class="appearance-option" type="button" data-theme-mode="light" aria-pressed="false">Light</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/static/menu.js"></script>
    <script type="module" src="./src/static/profile.js"></script>
  </body>
</html>
