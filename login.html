<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1116" />
    <title>Login | Dominion</title>
    <link rel="stylesheet" href="./src/assets/styles.css" />
    <link rel="stylesheet" href="./src/assets/product.css" />
    <link rel="stylesheet" href="./src/assets/menu.css" />
  </head>
  <body>
    <main class="app-shell auth-shell">
      <header class="topbar">
        <a class="back-link" href="./index.html">‹ Home</a>
        <button class="theme-toggle" id="themeToggle">Dark Theme</button>
      </header>
      <section class="card auth-card">
        <p class="eyebrow">Welcome Back</p>
        <h1>Log in</h1>
        <p class="lead">Enter your info to return to your dashboard.</p>
        <form id="authForm">
          <label>Email<input id="email" type="email" placeholder="you@example.com" required /></label>
          <label>Password<input id="password" type="password" placeholder="••••••••" required /></label>
          <button class="primary" type="submit">Go to Dashboard</button>
        </form>
        <p class="auth-note">New here? <a href="./register.html">Create an account</a></p>
      </section>
    </main>
    <script type="module" src="./src/static/menu.js"></script>
    <script type="module" src="./src/static/auth.js"></script>
  </body>
</html>
